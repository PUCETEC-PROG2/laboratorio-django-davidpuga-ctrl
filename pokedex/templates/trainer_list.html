{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Lista de Entrenadores</h2>
        
        <a href="{% url 'pokedex:add_trainer' %}" class="btn btn-danger">
            <i class="fas fa-plus"></i> Agregar Entrenador
        </a>
    </div>

    <div class="list-group">
        {% for trainer in trainers %}
            <a href="{% url 'pokedex:display_trainer' trainer.id %}" class="list-group-item list-group-item-action">
                {{ trainer.first_name }} {{ trainer.last_name }}
            </a>
        {% empty %}
            <p>No hay entrenadores registrados aún.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
